networks:
  mockingbird:
    driver: bridge

volumes:
  rabbitmq_data:
  auth_pg_data:
  user_pg_data:
  flow_mongo_data:
  messaging_pg_data:
  campaign_pg_data:
  analytics_pg_data:

services:
  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: mockingbird
      RABBITMQ_DEFAULT_PASS: mockingbird
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - mockingbird
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 8

  auth-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
      POSTGRES_DB: auth
    volumes:
      - auth_pg_data:/var/lib/postgresql/data
    networks:
      - mockingbird
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d auth"]
      interval: 10s
      timeout: 5s
      retries: 8

  user-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: users
      POSTGRES_PASSWORD: users
      POSTGRES_DB: users
    volumes:
      - user_pg_data:/var/lib/postgresql/data
    networks:
      - mockingbird
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U users -d users"]
      interval: 10s
      timeout: 5s
      retries: 8

  flow-db:
    image: mongo:7
    volumes:
      - flow_mongo_data:/data/db
    networks:
      - mockingbird
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 8

  messaging-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: messaging
      POSTGRES_PASSWORD: messaging
      POSTGRES_DB: messaging
    volumes:
      - messaging_pg_data:/var/lib/postgresql/data
    networks:
      - mockingbird
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U messaging -d messaging"]
      interval: 10s
      timeout: 5s
      retries: 8

  campaign-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: campaigns
      POSTGRES_PASSWORD: campaigns
      POSTGRES_DB: campaigns
    volumes:
      - campaign_pg_data:/var/lib/postgresql/data
    networks:
      - mockingbird
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campaigns -d campaigns"]
      interval: 10s
      timeout: 5s
      retries: 8

  analytics-db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: analytics
      POSTGRES_DB: analytics
    volumes:
      - analytics_pg_data:/var/lib/postgresql/data
    networks:
      - mockingbird
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytics -d analytics"]
      interval: 10s
      timeout: 5s
      retries: 8

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    environment:
      PORT: 4000
      DATABASE_URL: postgres://auth:auth@auth-db:5432/auth
      JWT_SECRET: dev_mockingbird_secret
    depends_on:
      auth-db:
        condition: service_healthy
    ports:
      - "4000:4000"
    networks:
      - mockingbird

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    environment:
      PORT: 4001
      DATABASE_URL: postgres://users:users@user-db:5432/users
      RABBITMQ_URL: amqp://mockingbird:mockingbird@rabbitmq:5672
    depends_on:
      user-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "4001:4001"
    networks:
      - mockingbird

  flow-service:
    build:
      context: .
      dockerfile: services/flow-service/Dockerfile
    environment:
      PORT: 4002
      MONGO_URL: mongodb://flow-db:27017/flows
      RABBITMQ_URL: amqp://mockingbird:mockingbird@rabbitmq:5672
    depends_on:
      flow-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "4002:4002"
    networks:
      - mockingbird

  messaging-service:
    build:
      context: .
      dockerfile: services/messaging-service/Dockerfile
    environment:
      PORT: 4003
      DATABASE_URL: postgres://messaging:messaging@messaging-db:5432/messaging
      RABBITMQ_URL: amqp://mockingbird:mockingbird@rabbitmq:5672
      WHATSAPP_TOKEN: local-dev-token
    depends_on:
      messaging-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "4003:4003"
    networks:
      - mockingbird

  campaign-service:
    build:
      context: .
      dockerfile: services/campaign-service/Dockerfile
    environment:
      PORT: 4004
      DATABASE_URL: postgres://campaigns:campaigns@campaign-db:5432/campaigns
      RABBITMQ_URL: amqp://mockingbird:mockingbird@rabbitmq:5672
      USER_SERVICE_URL: http://user-service:4001
      FLOW_SERVICE_URL: http://flow-service:4002
    depends_on:
      campaign-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "4004:4004"
    networks:
      - mockingbird

  analytics-service:
    build:
      context: .
      dockerfile: services/analytics-service/Dockerfile
    environment:
      PORT: 4005
      DATABASE_URL: postgres://analytics:analytics@analytics-db:5432/analytics
      RABBITMQ_URL: amqp://mockingbird:mockingbird@rabbitmq:5672
    depends_on:
      analytics-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "4005:4005"
    networks:
      - mockingbird

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    environment:
      PORT: 8080
      JWT_SECRET: dev_mockingbird_secret
      AUTH_SERVICE_URL: http://auth-service:4000
      USER_SERVICE_URL: http://user-service:4001
      FLOW_SERVICE_URL: http://flow-service:4002
      MESSAGING_SERVICE_URL: http://messaging-service:4003
      CAMPAIGN_SERVICE_URL: http://campaign-service:4004
      ANALYTICS_SERVICE_URL: http://analytics-service:4005
    depends_on:
      - auth-service
      - user-service
      - flow-service
      - messaging-service
      - campaign-service
      - analytics-service
    ports:
      - "8080:8080"
    networks:
      - mockingbird

  flow-builder-mf:
    build:
      context: .
      dockerfile: frontend/flow-builder-mf/Dockerfile
    networks:
      - mockingbird

  campaign-manager-mf:
    build:
      context: .
      dockerfile: frontend/campaign-manager-mf/Dockerfile
    networks:
      - mockingbird

  user-manager-mf:
    build:
      context: .
      dockerfile: frontend/user-manager-mf/Dockerfile
    networks:
      - mockingbird

  analytics-dashboard-mf:
    build:
      context: .
      dockerfile: frontend/analytics-dashboard-mf/Dockerfile
    networks:
      - mockingbird

  shell-app:
    build:
      context: .
      dockerfile: frontend/shell-app/Dockerfile
    environment:
      VITE_GATEWAY_URL: http://localhost:8080
    networks:
      - mockingbird

  frontend-proxy:
    image: nginx:1.27-alpine
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - shell-app
      - flow-builder-mf
      - campaign-manager-mf
      - user-manager-mf
      - analytics-dashboard-mf
    ports:
      - "3000:80"
    networks:
      - mockingbird
